  <!-- 縦の日付ガイド -->
  <g stroke="#ffffff" stroke-opacity="0.25" stroke-width="4">
    <line x1="160" y1="190" x2="160" y2="392"/>
    <line x1="256" y1="190" x2="256" y2="392"/>
    <line x1="352" y1="190" x2="352" y2="392"/>
